version: '3.8'

services:
  # Redis for queues (BullMQ) and caching
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # Optional local postgres (commented out since using Supabase)
  # db:
  #   image: postgres:15-alpine
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: password
  #     POSTGRES_DB: medbridge
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  # Typesense for high-performance search
  typesense:
    image: typesense/typesense:26.0
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    environment:
      - TYPESENSE_DATA_DIR=/data
      - TYPESENSE_API_KEY=medbridge_dev_typesense_key_change_in_prod
      - TYPESENSE_ENABLE_CORS=true
    restart: always

volumes:
  redis_data:
  typesense_data:
