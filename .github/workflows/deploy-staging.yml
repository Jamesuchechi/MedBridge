name: Deploy Staging

on:
  push:
    branches: [ develop ]

jobs:
  deploy-web:
    name: Deploy Web (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          working-directory: ./apps/web

  deploy-api:
    name: Deploy API (Railway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Placeholder for Railway CLI deployment or similar
      - name: Deploy to Railway
        run: echo "Triggering Railway deployment for @medbridge/api"

  deploy-ai:
    name: Deploy AI Service (Railway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        run: echo "Triggering Railway deployment for @medbridge/ai-service"
